    <rect x="90" y="12" width="14" height="6" fill="#c69a5b" stroke="#2a1a0e"/>
    <rect x="118" y="20" width="14" height="16" rx="2" fill="#ffb040" stroke="#2a1a0e"/>
    <rect x="118" y="16" width="14" height="6" fill="#c69a5b" stroke="#2a1a0e"/>
