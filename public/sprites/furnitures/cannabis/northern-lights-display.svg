<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="neonGreen" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#C77DFF"/>
      <stop offset="50%" stop-color="#9D4EDD"/>
      <stop offset="100%" stop-color="#6A1FB7"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="crystalGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="smokeBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="rgba(6,12,20,0.16)" stroke="rgba(255,255,255,0.08)"/>
  <g filter="url(#glow)" transform="translate(32 27) scale(1.12) translate(-32 -27)">
    <ellipse cx="32" cy="25" rx="18" ry="12" fill="url(#neonGreen)" stroke="#C77DFF" stroke-width="2"/>
    <circle cx="28" cy="20" r="6" fill="#E8CBFF" stroke="#C77DFF" stroke-width="1"/>
    <circle cx="36" cy="22" r="4" fill="#E8CBFF" stroke="#C77DFF" stroke-width="1"/>
    <circle cx="30" cy="18" r="2" fill="#7DF9FF" filter="url(#crystalGlow)"/>
    <circle cx="38" cy="24" r="1.5" fill="#7DF9FF"/>
    <circle cx="27" cy="29" r="1.4" fill="#7DF9FF" opacity="0.9"/>
  </g>
  <path d="M32 38 Q30 48 32 55 Q34 48 32 38" fill="none" stroke="#3326C6" stroke-width="3" stroke-linecap="round"/>
  <circle cx="32" cy="15" r="20" fill="none" stroke="#C77DFF" stroke-width="1" opacity="0.38" filter="url(#smokeBlur)"/>
  <circle cx="20" cy="13" r="5" fill="none" stroke="#7DF9FF" stroke-width="0.8" opacity="0.35"/>
  <circle cx="44" cy="15" r="4" fill="none" stroke="#7DF9FF" stroke-width="0.8" opacity="0.3"/>
  <text x="32" y="60" text-anchor="middle" font-family="Arial" font-size="5" fill="#E8CBFF" letter-spacing="0.4">NORTHERN L</text>
</svg>