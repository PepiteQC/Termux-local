<svg width="48" height="24" viewBox="0 0 48 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Habbo-style Red Bed -->
  <!-- Mattress base -->
  <rect x="2" y="8" width="44" height="12" fill="#DC6464" stroke="#804040" stroke-width="1"/>

  <!-- Pillow -->
  <rect x="2" y="4" width="12" height="8" fill="#FFD0D0" stroke="#FF9999" stroke-width="1"/>

  <!-- Front left leg -->
  <rect x="2" y="20" width="4" height="4" fill="#643C14" stroke="#3C2410" stroke-width="1"/>

  <!-- Front right leg -->
  <rect x="42" y="20" width="4" height="4" fill="#643C14" stroke="#3C2410" stroke-width="1"/>

  <!-- Back left leg (hidden) -->
  <rect x="10" y="20" width="3" height="3" fill="#502810" stroke="#3C2410" stroke-width="1" opacity="0.8"/>

  <!-- Back right leg (hidden) -->
  <rect x="35" y="20" width="3" height="3" fill="#502810" stroke="#3C2410" stroke-width="1" opacity="0.8"/>

  <!-- Mattress detail line -->
  <line x1="2" y1="14" x2="46" y2="14" stroke="#B43C3C" stroke-width="0.5"/>

  <!-- Pillow detail -->
  <line x1="2" y1="8" x2="14" y2="8" stroke="#FFB3B3" stroke-width="0.5"/>
</svg>
