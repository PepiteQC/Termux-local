<svg width="24" height="32" viewBox="0 0 24 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Habbo-style Door -->
  <!-- Frame (dark brown) -->
  <rect x="4" y="2" width="16" height="30" fill="#643C14" stroke="#3C2410" stroke-width="1"/>

  <!-- Door panel (light brown) -->
  <rect x="6" y="4" width="12" height="26" fill="#C89060" stroke="#804030" stroke-width="1"/>

  <!-- Door panel detail (inset) -->
  <rect x="7" y="6" width="10" height="22" fill="#B47050" stroke="#804030" stroke-width="0.5"/>

  <!-- Door handle (gold) -->
  <circle cx="18" cy="15" r="2" fill="#FFD700" stroke="#DAA520" stroke-width="0.5"/>

  <!-- Door knob interior -->
  <circle cx="18" cy="15" r="1.5" fill="#FFED4E"/>

  <!-- Door frame top detail -->
  <rect x="2" y="0" width="20" height="2" fill="#3C2410"/>

  <!-- Hinge marks -->
  <line x1="4" y1="8" x2="6" y2="8" stroke="#3C2410" stroke-width="0.5"/>
  <line x1="4" y1="16" x2="6" y2="16" stroke="#3C2410" stroke-width="0.5"/>
  <line x1="4" y1="24" x2="6" y2="24" stroke="#3C2410" stroke-width="0.5"/>
</svg>
