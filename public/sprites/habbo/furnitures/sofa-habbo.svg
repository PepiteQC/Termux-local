<svg width="48" height="24" viewBox="0 0 48 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Habbo-style Red Sofa -->
  <!-- Main seating surface -->
  <rect x="4" y="10" width="40" height="10" fill="#DC6464" stroke="#804040" stroke-width="1"/>

  <!-- Back cushion -->
  <rect x="6" y="2" width="36" height="10" fill="#DC6464" stroke="#804040" stroke-width="1"/>

  <!-- Left armrest -->
  <rect x="2" y="8" width="4" height="12" fill="#DC6464" stroke="#804040" stroke-width="1"/>
  <rect x="1" y="14" width="5" height="2" fill="#B43C3C"/>

  <!-- Right armrest -->
  <rect x="42" y="8" width="4" height="12" fill="#DC6464" stroke="#804040" stroke-width="1"/>
  <rect x="42" y="14" width="5" height="2" fill="#B43C3C"/>

  <!-- Front left leg -->
  <rect x="4" y="20" width="3" height="4" fill="#643C14" stroke="#3C2410" stroke-width="1"/>

  <!-- Front right leg -->
  <rect x="41" y="20" width="3" height="4" fill="#643C14" stroke="#3C2410" stroke-width="1"/>

  <!-- Back legs (shadow) -->
  <rect x="16" y="20" width="2" height="3" fill="#502810" opacity="0.8"/>
  <rect x="30" y="20" width="2" height="3" fill="#502810" opacity="0.8"/>

  <!-- Cushion details -->
  <line x1="4" y1="16" x2="44" y2="16" stroke="#B43C3C" stroke-width="0.5"/>
</svg>
