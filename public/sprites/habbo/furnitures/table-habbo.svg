<svg width="48" height="32" viewBox="0 0 48 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Habbo-style Brown Table -->
  <!-- Top surface -->
  <rect x="4" y="8" width="40" height="8" fill="#B47050" stroke="#804030" stroke-width="1"/>

  <!-- Left leg -->
  <rect x="6" y="16" width="4" height="12" fill="#643C14" stroke="#3C2410" stroke-width="1"/>

  <!-- Right leg -->
  <rect x="38" y="16" width="4" height="12" fill="#643C14" stroke="#3C2410" stroke-width="1"/>

  <!-- Back left leg (shadow) -->
  <rect x="14" y="16" width="3" height="11" fill="#502810" stroke="#3C2410" stroke-width="1" opacity="0.8"/>

  <!-- Back right leg (shadow) -->
  <rect x="31" y="16" width="3" height="11" fill="#502810" stroke="#3C2410" stroke-width="1" opacity="0.8"/>

  <!-- Table top edge shadow -->
  <line x1="4" y1="16" x2="44" y2="16" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>

  <!-- Center detail -->
  <rect x="20" y="10" width="8" height="4" fill="#9A5840" stroke="#643C14" stroke-width="1" opacity="0.6"/>
</svg>
