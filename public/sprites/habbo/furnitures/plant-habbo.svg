<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Habbo-style Plant in Pot -->
  <!-- Pot (clay) -->
  <path d="M 8 18 L 6 28 Q 6 30 8 30 L 24 30 Q 26 30 26 28 L 24 18 Z" fill="#C87040" stroke="#804020" stroke-width="1"/>

  <!-- Pot rim -->
  <rect x="8" y="16" width="16" height="2" fill="#B46030" stroke="#804020" stroke-width="1"/>

  <!-- Pot shine -->
  <path d="M 10 20 Q 10 22 12 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- Soil -->
  <ellipse cx="16" cy="18" rx="8" ry="2" fill="#8B6F47" stroke="#643C14" stroke-width="1"/>

  <!-- Left leaf -->
  <ellipse cx="10" cy="6" rx="4" ry="8" fill="#64B450" stroke="#3C8C1C" stroke-width="1" transform="rotate(-25 10 6)"/>

  <!-- Center leaf -->
  <ellipse cx="16" cy="2" rx="3" ry="10" fill="#7CC864" stroke="#4CA030" stroke-width="1"/>

  <!-- Right leaf -->
  <ellipse cx="22" cy="6" rx="4" ry="8" fill="#64B450" stroke="#3C8C1C" stroke-width="1" transform="rotate(25 22 6)"/>

  <!-- Additional small leaves -->
  <ellipse cx="8" cy="12" rx="2" ry="6" fill="#5C9844" stroke="#3C8C1C" stroke-width="0.5" transform="rotate(-30 8 12)"/>
  <ellipse cx="24" cy="12" rx="2" ry="6" fill="#5C9844" stroke="#3C8C1C" stroke-width="0.5" transform="rotate(30 24 12)"/>
</svg>
