  <!-- Arms -->
  <rect x="8" y="34" width="8" height="12" fill="#F0C8A0" stroke="#C89060" stroke-width="1"/>
  <rect x="48" y="34" width="8" height="12" fill="#F0C8A0" stroke="#C89060" stroke-width="1"/>

  <!-- Legs (pants) -->
  <rect x="20" y="48" width="8" height="12" fill="#3264B4" stroke="#1E4080" stroke-width="1"/>
  <rect x="36" y="48" width="8" height="12" fill="#3264B4" stroke="#1E4080" stroke-width="1"/>

  <!-- Shoes -->
  <rect x="20" y="60" width="8" height="4" fill="#505050" stroke="#202020" stroke-width="1"/>
  <rect x="36" y="60" width="8" height="4" fill="#505050" stroke="#202020" stroke-width="1"/>

  <!-- Eyes -->
  <circle cx="22" cy="16" r="2" fill="#000"/>
  <circle cx="42" cy="16" r="2" fill="#000"/>

  <!-- Mouth -->
  <line x1="26" y1="26" x2="38" y2="26" stroke="#640000" stroke-width="1"/>
