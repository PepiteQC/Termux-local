<svg width="64" height="80" viewBox="0 0 64 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="32" cy="74" rx="14" ry="4" fill="rgba(0,0,0,0.3)"/>

  <!-- Head -->
  <rect x="16" y="8" width="32" height="24" fill="#F0C8A0" stroke="#C89060" stroke-width="1"/>

  <!-- Hair -->
  <rect x="14" y="6" width="36" height="14" fill="#643C14" stroke="#3C2410" stroke-width="1"/>

  <!-- Body (shirt) -->
